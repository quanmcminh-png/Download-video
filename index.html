<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Tải 12zz Đa Năng</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f6f9; padding: 20px; margin: 0; overflow-x: hidden; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: auto; margin-top: 50px; position: relative; z-index: 1; border-top: 5px solid #000; }
        h2 { margin-top: 0; margin-bottom: 15px; color: #111; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dàn Logo Các Ứng Dụng */
        .logo-row { display: flex; justify-content: center; gap: 18px; margin-bottom: 25px; }
        .logo-row svg { width: 28px; height: 28px; transition: transform 0.3s; }
        .logo-row svg:hover { transform: scale(1.2); }

        input { padding: 14px; width: 90%; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; text-align: center; }
        input:focus { border-color: #000; outline: none; }
        button { padding: 14px 20px; width: 90%; cursor: pointer; background-color: #000; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background-color: #333; transform: translateY(-2px); }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 8px; }
        
        .video-container { margin-top: 20px; display: none; }
        video, img { width: 100%; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        audio { width: 100%; margin-bottom: 10px; }
        .download-btn { display: inline-block; padding: 12px 20px; background-color: #eee; color: #000; text-decoration: none; border-radius: 8px; font-weight: bold; border: 2px solid #000; transition: 0.3s; }
        .download-btn:hover { background-color: #000; color: #fff; }

        /* Nút lựa chọn YouTube */
        .yt-btn-group { display: none; gap: 10px; margin-top: 15px; }
        .yt-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid #000; width: 100%; }
        .yt-btn.mp4 { background: #000; color: #fff; margin-bottom: 10px; }
        .yt-btn.mp4:hover { background: #333; }
        .yt-btn.mp3 { background: #fff; color: #000; }
        .yt-btn.mp3:hover { background: #eee; }

        /* NÚT NỔI 12ZZ */
        #floatingBtn {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            background-color: #ffffff; border: 3px solid #000000; border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: flex; justify-content: center;
            align-items: center; z-index: 9999; cursor: pointer; user-select: none; touch-action: none;
        }
        .text-12zz { color: #000000; font-size: 18px; font-weight: 900; font-family: 'Arial Black', sans-serif; letter-spacing: -1px; }
        #floatingBtn::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 2px solid #000; animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tải Đa Nền Tảng</h2>
        
        <!-- Dàn Logo Các Ứng Dụng -->
        <div class="logo-row">
            <!-- TikTok -->
            <svg viewBox="0 0 448 512"><path fill="#000" d="M448 209.9a210.1 210.1 0 0 1 -122.8-39.3V349.4A162.6 162.6 0 1 1 185 188.3V278.2a74.6 74.6 0 1 0 52.2 71.2V0l88 0a121.2 121.2 0 0 0 1.9 22.2h0A122.2 122.2 0 0 0 381 102.4a121.4 121.4 0 0 0 67 20.1z"/></svg>
            <!-- Facebook -->
            <svg viewBox="0 0 512 512"><path fill="#1877F2" d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.8 90.7 226.4 209.3 245V327.7h-63V256h63v-54.6c0-62.2 37-96.5 93.7-96.5 27.1 0 55.5 4.8 55.5 4.8v61h-31.3c-30.8 0-40.4 19.1-40.4 38.7V256h68.8l-11 71.7h-57.8V501C413.3 482.4 504 379.8 504 256z"/></svg>
            <!-- Pinterest -->
            <svg viewBox="0 0 496 512"><path fill="#E60023" d="M248 8C111.1 8 0 119.1 0 256c0 105.7 65.5 195.4 158.4 235.6-1.5-18.3-2.1-41.2 1.4-61.2 3.1-17.6 22-92.4 22-92.4s-5.3-10.7-5.3-26.7c0-25 14.5-43.7 32.6-43.7 15.4 0 22.8 11.5 22.8 25.4 0 15.5-9.8 38.6-14.9 60-4.2 17.8 8.9 32.3 26.5 32.3 31.8 0 54.1-39.7 54.1-87.3 0-38.3-26-66.6-70.3-66.6-52 0-84.3 38.5-84.3 80.9 0 14.8 4.3 25.1 11.5 33.1 1.6 1.7 1.8 3.5 1.2 5.8-1.5 5.5-4.8 19-5.5 22.1-1 4.2-3.6 5-7.7 3.3-22-9.2-32.2-34.6-32.2-61 0-44.5 36.8-98.8 114.7-98.8 62.7 0 106.6 46.1 106.6 96 0 65.1-35.3 113.8-87.4 113.8-17.9 0-34.8-9.8-40.9-21l-11.2 44.8c-4.1 15.8-11.8 30.6-19.1 42.4 22.2 6.5 45.7 10 70.3 10 136.9 0 248-111.1 248-248S384.9 8 248 8z"/></svg>
            <!-- YouTube -->
            <svg viewBox="0 0 576 512"><path fill="#FF0000" d="M549.7 124.1c-6.3-23.7-24.8-42.3-48.3-48.6C458.8 64 288 64 288 64S117.2 64 74.6 75.5c-23.5 6.3-42 24.9-48.3 48.6-11.4 42.9-11.4 132.3-11.4 132.3s0 89.4 11.4 132.3c6.3 23.7 24.8 41.5 48.3 47.8C117.2 448 288 448 288 448s170.8 0 213.4-11.5c23.5-6.3 42-24.2 48.3-47.8 11.4-42.9 11.4-132.3 11.4-132.3s0-89.4-11.4-132.3zm-317.5 213.5V175.2l142.7 81.2-142.7 81.2z"/></svg>
            <!-- Spotify -->
            <svg viewBox="0 0 496 512"><path fill="#1DB954" d="M248 8C111.1 8 0 119.1 0 256s111.1 248 248 248 248-111.1 248-248S384.9 8 248 8zm100.7 364.9c-4.2 0-6.8-1.3-10.7-3.6-62.4-37.6-135-39.2-206.7-24.5-3.9 1-9 2.6-11.9 2.6-9.7 0-15.8-7.7-15.8-15.8 0-10.3 6.1-15.2 13.6-16.8 81.9-18.1 165.6-16.5 237 26.2 6.1 3.9 9.7 7.4 9.7 16.5s-7.1 15.4-15.2 15.4zm26.9-65.6c-5.2 0-8.7-2.3-12.3-4.2-76.2-45.7-172.9-52.9-246.3-30.8-3.9 1-8.7 2.9-12.9 2.9-12.9 0-21.7-10.3-21.7-21.7 0-13.6 7.4-20.1 15.5-22.3 84.6-26.2 193.3-17.5 281.3 34.3 6.8 3.9 11.3 8.7 11.3 19.4-.1 13.6-10.4 22.4-24.9 22.4zm28.1-74.9c-6.1 0-10.7-2.6-15.2-5.5-88.5-54.3-206.7-61.1-294.7-35.9-4.5 1.3-10.7 3.2-16.2 3.2-16.2 0-27.5-13.6-27.5-27.5 0-18.1 10.7-26.5 18.8-28.8 103.4-30.7 236.4-23.6 339.5 39.1 7.8 4.9 13.3 11 13.3 23.3-.1 17.5-13.7 32-38 32z"/></svg>
        </div>

        <input type="text" id="mediaUrl" placeholder="Dán link vào đây...">
        <button onclick="processLink(false)">Tải Xuống (Thủ công)</button>
        
        <!-- Khung 2 nút MP4/MP3 cho YouTube -->
        <div id="ytChoices" class="yt-btn-group">
            <button class="yt-btn mp4" onclick="downloadYouTube('mp4')">🎬 Tải Video (MP4)</button>
            <button class="yt-btn mp3" onclick="downloadYouTube('mp3')">🎵 Tải Nhạc (MP3)</button>
        </div>

        <div id="status"></div>

        <div class="video-container" id="mediaResult">
            <video id="videoPlayer" controls autoplay style="display:none;"></video>
            <img id="imagePlayer" style="display:none;" />
            <!-- Thẻ Audio cho Spotify / Nhạc -->
            <audio id="audioPlayer" controls style="display:none;"></audio>
            <br>
            <a id="downloadLink" class="download-btn" href="#" target="_blank">⬇️ Lưu Về Máy</a>
        </div>
    </div>

    <!-- CỬA SỔ NỔI 12ZZ -->
    <div id="floatingBtn">
        <span class="text-12zz">12zz</span>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const mediaResult = document.getElementById('mediaResult');
        const videoPlayer = document.getElementById('videoPlayer');
        const imagePlayer = document.getElementById('imagePlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadLink = document.getElementById('downloadLink');
        const ytChoices = document.getElementById('ytChoices');
        const myRapidApiKey = '32f661c544msh19f1b70e70a6a66p106890jsnb259f49ed3d8'; 

        function getYouTubeId(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/);
            return match ? match[1] : null;
        }

        function generateFileName(url, prefix, extension) {
            const cleanText = Math.random().toString(36).substring(2, 10);
            return `12zz_${prefix}_${cleanText}.${extension}`;
        }

        // BỘ QUÉT LINK
        function extractMediaUrl(obj, expectedType = 'mp4') {
            let foundUrl = null;
            function search(o) {
                if (foundUrl) return; 
                if (typeof o === 'string' && o.startsWith('http')) {
                    if (expectedType === 'mp3' && (o.includes('.mp3') || o.includes('.m4a') || o.includes('audio'))) { foundUrl = o; return; }
                    if (expectedType === 'mp4' && (o.includes('.mp4') || o.includes('video'))) { foundUrl = o; return; }
                    if (!foundUrl && (o.includes('googlevideo.com') || o.includes('.mp4') || o.includes('.mp3') || o.includes('.jpg'))) { foundUrl = o; }
                }
                if (typeof o === 'object' && o !== null) {
                    const keys = expectedType === 'mp3' ? 
                        ['audio_url', 'audio', 'download_link', 'url', 'link', 'data'] : 
                        ['video_url', 'url', 'link', 'downloadUrl', 'playAddr', 'direct_media_url'];
                    for (let key of keys) {
                        if (o[key] && typeof o[key] === 'string' && o[key].startsWith('http')) { foundUrl = o[key]; return; }
                    }
                    for (let k in o) search(o[k]); 
                }
            }
            search(obj);
            return { url: foundUrl, isVideo: expectedType === 'mp4' };
        }

        // ÉP TẢI XUỐNG
        async function forceDownload(mediaUrl, fileName) {
            statusDiv.innerHTML = "<span style='color:blue;'>⏳ Đang kéo file về máy...</span>";
            try {
                const response = await fetch(mediaUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                statusDiv.innerHTML = `<span style='color:green;'>✔️ Đã lưu thành công: ${fileName}</span>`;
            } catch (error) {
                const a = document.createElement('a');
                a.href = mediaUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                statusDiv.innerHTML = `<span style='color:green;'>✔️ Đã bắt đầu tải! (Nếu mở sang trang khác, hãy nhấn giữ để lưu)</span>`;
            }
        }

        function processLink(autoDownload = false) {
            const urlInput = document.getElementById('mediaUrl').value.trim();
            if (!urlInput) {
                statusDiv.innerHTML = "<span style='color:red;'>Bạn chưa dán link kìa!</span>"; return;
            }

            mediaResult.style.display = 'none';
            videoPlayer.style.display = 'none';
            imagePlayer.style.display = 'none';
            audioPlayer.style.display = 'none';
            ytChoices.style.display = 'none';
            videoPlayer.pause();
            audioPlayer.pause();

            if (urlInput.match(/youtube\.com|youtu\.be/i)) {
                window.currentYtUrl = urlInput;
                statusDiv.innerHTML = "<span style='color:red;'>🔴 Đã nhận diện YouTube! Vui lòng chọn định dạng:</span>";
                ytChoices.style.display = 'flex'; 
            }
            else if (urlInput.match(/spotify\.com/i)) downloadSpotify(urlInput, autoDownload);
            else if (urlInput.match(/tiktok\.com/i)) downloadTikTok(urlInput, autoDownload);
            else if (urlInput.match(/facebook\.com|fb\.watch/i)) downloadFacebook(urlInput, autoDownload);
            else if (urlInput.match(/pinterest\.com|pin\.it/i)) downloadPinterest(urlInput, autoDownload);
            else statusDiv.innerHTML = "<span style='color:red;'>Chỉ hỗ trợ TikTok, Facebook, Pinterest, YouTube, Spotify.</span>";
        }

        // 1. TẢI SPOTIFY (SỬ DỤNG API MỚI)
        async function downloadSpotify(url, autoDownload) {
            statusDiv.innerHTML = "<span style='color:#1DB954;'>⏳ Đang kết nối Spotify...</span>";
            try {
                // Sử dụng API theo đúng ảnh gửi (cần nguyên đường link Spotify)
                const response = await fetch(`https://spotify-downloader9.p.rapidapi.com/downloadSong?songId=${encodeURIComponent(url)}`, {
                    method: 'GET',
                    headers: { 'x-rapidapi-host': 'spotify-downloader9.p.rapidapi.com', 'x-rapidapi-key': myRapidApiKey }
                });
                
                const result = await response.json();
                const mediaData = extractMediaUrl(result, 'mp3');

                if (mediaData.url) {
                    const finalFileName = generateFileName(url, "SPO", "mp3");
                    audioPlayer.src = mediaData.url;
                    audioPlayer.style.display = 'block';
                    downloadLink.href = mediaData.url;
                    downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(mediaData.url, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy nhạc Spotify!";
                } else {
                    statusDiv.innerHTML = "<span style='color:red;'>API không bóc tách được bài hát này.</span>";
                }
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI Spotify.</span>"; }
        }

        // 2. YOUTUBE MP4 VÀ MP3 
        async function downloadYouTube(type) {
            ytChoices.style.display = 'none'; 
            const url = window.currentYtUrl;
            const videoId = getYouTubeId(url);
            if (!videoId) { statusDiv.innerHTML = "<span style='color:red;'>Link YouTube không hợp lệ.</span>"; return; }
            statusDiv.innerHTML = `<span style='color:red;'>⏳ Đang bóc tách YouTube sang ${type.toUpperCase()}...</span>`;
            
            try {
                let apiUrl = ''; let host = '';
                if (type === 'mp3') {
                    apiUrl = `https://youtube-mp3-audio-video-downloader.p.rapidapi.com/get_mp3_download_link/${videoId}?quality=low&wait_until_the_file_is_ready=true`; 
                    host = 'youtube-mp3-audio-video-downloader.p.rapidapi.com';
                } else {
                    apiUrl = `https://youtube-media-downloader.p.rapidapi.com/v2/video/details?videoId=${videoId}&urlAccess=normal&videos=auto&audios=auto`;
                    host = 'youtube-media-downloader.p.rapidapi.com';
                }

                const response = await fetch(apiUrl, { method: 'GET', headers: { 'x-rapidapi-host': host, 'x-rapidapi-key': myRapidApiKey } });
                const result = await response.json();
                const mediaData = extractMediaUrl(result, type);
                
                if (mediaData.url) {
                    const finalFileName = generateFileName(url, "YT", type);
                    if (type === 'mp4') { videoPlayer.src = mediaData.url; videoPlayer.style.display = 'block'; }
                    else { audioPlayer.src = mediaData.url; audioPlayer.style.display = 'block'; }
                    downloadLink.href = mediaData.url;
                    downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    forceDownload(mediaData.url, finalFileName);
                } else statusDiv.innerHTML = "<span style='color:red;'>API không lấy được file.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI YouTube.</span>"; }
        }

        // 3. TẢI TIKTOK 
        async function downloadTikTok(url, autoDownload) {
            statusDiv.innerHTML = "⏳ Đang bóc tách TikTok...";
            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const result = await response.json();
                if (result.code === 0) {
                    const videoUrl = result.data.play;
                    const finalFileName = generateFileName(url, "TT", "mp4");
                    videoPlayer.src = videoUrl; videoPlayer.style.display = 'block';
                    downloadLink.href = videoUrl; downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(videoUrl, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy video TikTok!";
                } else statusDiv.innerHTML = "<span style='color:red;'>Lỗi link TikTok.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi mạng khi tải TikTok.</span>"; }
        }

        // 4. TẢI FACEBOOK
        async function downloadFacebook(url, autoDownload) {
            statusDiv.innerHTML = "<span style='color:#1877F2;'>⏳ Đang kết nối Facebook...</span>";
            try {
                const response = await fetch(`https://facebook-media-downloader1.p.rapidapi.com/get_media`, {
                    method: 'POST', headers: { 'content-type': 'application/json', 'x-rapidapi-host': 'facebook-media-downloader1.p.rapidapi.com', 'x-rapidapi-key': myRapidApiKey },
                    body: JSON.stringify({ url: url })
                });
                const result = await response.json();
                const mediaData = extractMediaUrl(result, 'mp4');
                if (mediaData.url) {
                    const finalFileName = generateFileName(url, "FB", mediaData.isVideo ? "mp4" : "jpg");
                    videoPlayer.src = mediaData.url; videoPlayer.style.display = 'block';
                    downloadLink.href = mediaData.url; downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(mediaData.url, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy video Facebook!";
                } else statusDiv.innerHTML = "<span style='color:red;'>API chưa bóc tách được video này.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI Facebook.</span>"; }
        }

        // 5. TẢI PINTEREST 
        async function downloadPinterest(url, autoDownload) {
            statusDiv.innerHTML = "<span style='color:#E60023;'>⏳ Đang kết nối Pinterest...</span>";
            try {
                const response = await fetch(`https://pinterest-video-and-image-downloader.p.rapidapi.com/pinterest?url=${encodeURIComponent(url)}`, {
                    method: 'GET', headers: { 'x-rapidapi-host': 'pinterest-video-and-image-downloader.p.rapidapi.com', 'x-rapidapi-key': myRapidApiKey }
                });
                const result = await response.json();
                const mediaData = extractMediaUrl(result, 'mp4');
                if (mediaData.url) {
                    const ext = mediaData.isVideo ? "mp4" : "jpg";
                    const finalFileName = generateFileName(url, "PIN", ext);
                    if (mediaData.isVideo) { videoPlayer.src = mediaData.url; videoPlayer.style.display = 'block'; } 
                    else { imagePlayer.src = mediaData.url; imagePlayer.style.display = 'block'; }
                    downloadLink.href = mediaData.url; downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(mediaData.url, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy nội dung Pinterest!";
                } else statusDiv.innerHTML = "<span style='color:red;'>API không lấy được nội dung.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI Pinterest.</span>"; }
        }

        // --- CHẠM VÀO NÚT NỔI 12ZZ ---
        const fab = document.getElementById('floatingBtn');
        let isDragging = false, isMoved = false, offsetX, offsetY;

        const startDrag = (e) => {
            isDragging = true; isMoved = false;
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            offsetX = clientX - fab.getBoundingClientRect().left;
            offsetY = clientY - fab.getBoundingClientRect().top;
        };

        const drag = (e) => {
            if (!isDragging) return;
            isMoved = true;
            e.preventDefault(); 
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            let newX = clientX - offsetX;
            let newY = clientY - offsetY;
            newX = Math.max(0, Math.min(newX, window.innerWidth - fab.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - fab.offsetHeight));
            fab.style.left = `${newX}px`;
            fab.style.top = `${newY}px`;
            fab.style.right = 'auto';
            fab.style.bottom = 'auto';
        };

        const stopDrag = () => { isDragging = false; };

        fab.addEventListener('mousedown', startDrag);
        fab.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);

        fab.addEventListener('click', async () => {
            if (isMoved) return; 
            try {
                const text = await navigator.clipboard.readText();
                if (text.match(/tiktok\.com|facebook\.com|fb\.watch|pinterest\.com|pin\.it|youtube\.com|youtu\.be|spotify\.com/i)) {
                    document.getElementById('mediaUrl').value = text;
                    processLink(true);
                } else {
                    alert("Không tìm thấy link của 5 ứng dụng trên trong khay nhớ tạm!");
                }
            } catch (err) {
                alert("Hãy cấp quyền cho trang web xem khay nhớ tạm nhé!");
            }
        });
    </script>
</body>
</html>
