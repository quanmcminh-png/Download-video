<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Tải 12zz Đa Năng</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f6f9; padding: 20px; margin: 0; overflow-x: hidden; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: auto; margin-top: 50px; position: relative; z-index: 1; border-top: 5px solid #000; }
        h2 { margin-top: 0; color: #111; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        input { padding: 14px; width: 90%; margin-bottom: 15px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #000; outline: none; }
        button { padding: 14px 20px; width: 90%; cursor: pointer; background-color: #000; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background-color: #333; transform: translateY(-2px); }
        #status { margin-top: 20px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 8px; }
        .video-container { margin-top: 20px; display: none; }
        video, img { width: 100%; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .download-btn { display: inline-block; padding: 12px 20px; background-color: #eee; color: #000; text-decoration: none; border-radius: 8px; font-weight: bold; border: 2px solid #000; transition: 0.3s; }
        .download-btn:hover { background-color: #000; color: #fff; }

        /* Nút lựa chọn YouTube */
        .yt-btn-group { display: none; gap: 10px; margin-top: 15px; }
        .yt-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; border: 2px solid #000; width: 100%; }
        .yt-btn.mp4 { background: #000; color: #fff; margin-bottom: 10px; }
        .yt-btn.mp4:hover { background: #333; }
        .yt-btn.mp3 { background: #fff; color: #000; }
        .yt-btn.mp3:hover { background: #eee; }

        /* NÚT NỔI 12ZZ */
        #floatingBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background-color: #ffffff;
            border: 3px solid #000000;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            user-select: none;
            touch-action: none;
        }

        .text-12zz {
            color: #000000;
            font-size: 18px;
            font-weight: 900;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: -1px;
        }

        #floatingBtn::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #000;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Tải Đa Nền Tảng</h2>
        <input type="text" id="mediaUrl" placeholder="TikTok, Facebook, Pinterest, YouTube...">
        <button onclick="processLink(false)">Tải Xuống (Thủ công)</button>
        
        <!-- Khung 2 nút MP4/MP3 cho YouTube -->
        <div id="ytChoices" class="yt-btn-group">
            <button class="yt-btn mp4" onclick="downloadYouTube('mp4')">🎬 Tải Video (MP4)</button>
            <button class="yt-btn mp3" onclick="downloadYouTube('mp3')">🎵 Tải Nhạc (MP3)</button>
        </div>

        <div id="status"></div>

        <div class="video-container" id="mediaResult">
            <video id="videoPlayer" controls autoplay style="display:none;"></video>
            <img id="imagePlayer" style="display:none;" />
            <br>
            <a id="downloadLink" class="download-btn" href="#" target="_blank">⬇️ Lưu Về Máy</a>
        </div>
    </div>

    <!-- CỬA SỔ NỔI 12ZZ -->
    <div id="floatingBtn">
        <span class="text-12zz">12zz</span>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const mediaResult = document.getElementById('mediaResult');
        const videoPlayer = document.getElementById('videoPlayer');
        const imagePlayer = document.getElementById('imagePlayer');
        const downloadLink = document.getElementById('downloadLink');
        const ytChoices = document.getElementById('ytChoices');
        const myRapidApiKey = '32f661c544msh19f1b70e70a6a66p106890jsnb259f49ed3d8'; 

        // Tách ID YouTube
        function getYouTubeId(url) {
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=))([^"&?\/\s]{11})/);
            return match ? match[1] : null;
        }

        function generateFileName(url, prefix, extension) {
            const cleanText = Math.random().toString(36).substring(2, 10);
            return `12zz_${prefix}_${cleanText}.${extension}`;
        }

        // Bộ quét link thông minh
        function extractMediaUrl(obj, expectedType = 'mp4') {
            let foundUrl = null;
            function search(o) {
                if (foundUrl) return; 
                
                if (typeof o === 'string' && o.startsWith('http')) {
                    if (expectedType === 'mp3' && (o.includes('.mp3') || o.includes('.m4a') || o.includes('audio'))) { foundUrl = o; return; }
                    if (expectedType === 'mp4' && (o.includes('.mp4') || o.includes('video'))) { foundUrl = o; return; }
                    if (!foundUrl && (o.includes('googlevideo.com') || o.includes('.mp4') || o.includes('.mp3'))) { foundUrl = o; }
                }
                
                if (typeof o === 'object' && o !== null) {
                    const keys = expectedType === 'mp3' ? 
                        ['audio_url', 'audio', 'download_link', 'url', 'link'] : 
                        ['video_url', 'url', 'link', 'downloadUrl', 'playAddr', 'direct_media_url'];
                    
                    for (let key of keys) {
                        if (o[key] && typeof o[key] === 'string' && o[key].startsWith('http')) {
                            foundUrl = o[key]; return;
                        }
                    }
                    for (let k in o) search(o[k]); 
                }
            }
            search(obj);
            return { url: foundUrl, isVideo: expectedType === 'mp4' };
        }

        // --- HÀM TẢI VỀ NGUYÊN BẢN ---
        async function forceDownload(mediaUrl, fileName) {
            statusDiv.innerHTML = "<span style='color:blue;'>⏳ Đang kéo file về máy...</span>";
            try {
                const response = await fetch(mediaUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                statusDiv.innerHTML = `<span style='color:green;'>✔️ Đã lưu thành công: ${fileName}</span>`;
            } catch (error) {
                const a = document.createElement('a');
                a.href = mediaUrl;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                statusDiv.innerHTML = `<span style='color:green;'>✔️ Đã bắt đầu tải! (Nếu mở sang trang khác, hãy nhấn giữ để lưu)</span>`;
            }
        }

        function processLink(autoDownload = false) {
            const urlInput = document.getElementById('mediaUrl').value.trim();
            if (!urlInput) {
                statusDiv.innerHTML = "<span style='color:red;'>Bạn chưa dán link kìa!</span>";
                return;
            }

            mediaResult.style.display = 'none';
            videoPlayer.style.display = 'none';
            imagePlayer.style.display = 'none';
            ytChoices.style.display = 'none';
            videoPlayer.pause();

            if (urlInput.match(/youtube\.com|youtu\.be/i)) {
                window.currentYtUrl = urlInput;
                statusDiv.innerHTML = "<span style='color:red;'>🔴 Đã nhận diện YouTube! Vui lòng chọn định dạng:</span>";
                ytChoices.style.display = 'flex'; // Hiện 2 nút
            }
            else if (urlInput.match(/tiktok\.com/i)) downloadTikTok(urlInput, autoDownload);
            else if (urlInput.match(/facebook\.com|fb\.watch/i)) downloadFacebook(urlInput, autoDownload);
            else if (urlInput.match(/pinterest\.com|pin\.it/i)) downloadPinterest(urlInput, autoDownload);
            else statusDiv.innerHTML = "<span style='color:red;'>Chỉ hỗ trợ TikTok, Facebook, Pinterest, YouTube.</span>";
        }

        // --- YOUTUBE MP4 VÀ MP3 CHÍNH XÁC TỪ ẢNH ---
        async function downloadYouTube(type) {
            ytChoices.style.display = 'none'; 
            const url = window.currentYtUrl;
            const videoId = getYouTubeId(url);
            
            if (!videoId) {
                statusDiv.innerHTML = "<span style='color:red;'>Link YouTube không hợp lệ.</span>";
                return;
            }

            statusDiv.innerHTML = `<span style='color:red;'>⏳ Đang bóc tách YouTube sang ${type.toUpperCase()}...</span>`;
            
            try {
                let apiUrl = '';
                let host = '';
                
                // Lắp ráp chính xác link API từ 2 bức ảnh của bạn
                if (type === 'mp3') {
                    apiUrl = `https://youtube-mp3-audio-video-downloader.p.rapidapi.com/get_mp3_download_link/${videoId}?quality=low&wait_until_the_file_is_ready=true`; 
                    host = 'youtube-mp3-audio-video-downloader.p.rapidapi.com';
                } else {
                    apiUrl = `https://youtube-media-downloader.p.rapidapi.com/v2/video/details?videoId=${videoId}&urlAccess=normal&videos=auto&audios=auto`;
                    host = 'youtube-media-downloader.p.rapidapi.com';
                }

                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'x-rapidapi-host': host, 'x-rapidapi-key': myRapidApiKey }
                });
                
                const result = await response.json();
                const mediaData = extractMediaUrl(result, type);
                
                if (mediaData.url) {
                    const finalFileName = generateFileName(url, "YT", type);
                    if (type === 'mp4') {
                        videoPlayer.src = mediaData.url;
                        videoPlayer.style.display = 'block';
                    }
                    downloadLink.href = mediaData.url;
                    downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';

                    forceDownload(mediaData.url, finalFileName);
                } else {
                    statusDiv.innerHTML = "<span style='color:red;'>API không lấy được file. Video này có thể bị đánh bản quyền hoặc chặn truy cập.</span>";
                }
            } catch (error) {
                statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI YouTube.</span>";
            }
        }

        // 1. TẢI TIKTOK 
        async function downloadTikTok(url, autoDownload) {
            statusDiv.innerHTML = "⏳ Đang bóc tách TikTok...";
            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const result = await response.json();
                if (result.code === 0) {
                    const videoUrl = result.data.play;
                    const finalFileName = generateFileName(url, "TT", "mp4");
                    videoPlayer.src = videoUrl;
                    videoPlayer.style.display = 'block';
                    downloadLink.href = videoUrl;
                    downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(videoUrl, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy video TikTok!";
                } else statusDiv.innerHTML = "<span style='color:red;'>Lỗi link TikTok.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi mạng khi tải TikTok.</span>"; }
        }

        // 2. TẢI FACEBOOK
        async function downloadFacebook(url, autoDownload) {
            statusDiv.innerHTML = "<span style='color:#1877F2;'>⏳ Đang kết nối Facebook...</span>";
            try {
                const response = await fetch(`https://facebook-media-downloader1.p.rapidapi.com/get_media`, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json', 'x-rapidapi-host': 'facebook-media-downloader1.p.rapidapi.com', 'x-rapidapi-key': myRapidApiKey },
                    body: JSON.stringify({ url: url })
                });
                const result = await response.json();
                const mediaData = extractMediaUrl(result, 'mp4');
                if (mediaData.url) {
                    const finalFileName = generateFileName(url, "FB", mediaData.isVideo ? "mp4" : "jpg");
                    videoPlayer.src = mediaData.url;
                    videoPlayer.style.display = 'block';
                    downloadLink.href = mediaData.url;
                    downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(mediaData.url, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy video Facebook!";
                } else statusDiv.innerHTML = "<span style='color:red;'>API chưa bóc tách được video này.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI Facebook.</span>"; }
        }

        // 3. TẢI PINTEREST 
        async function downloadPinterest(url, autoDownload) {
            statusDiv.innerHTML = "<span style='color:#E60023;'>⏳ Đang kết nối Pinterest...</span>";
            try {
                const response = await fetch(`https://pinterest-video-and-image-downloader.p.rapidapi.com/pinterest?url=${encodeURIComponent(url)}`, {
                    method: 'GET',
                    headers: { 'x-rapidapi-host': 'pinterest-video-and-image-downloader.p.rapidapi.com', 'x-rapidapi-key': myRapidApiKey }
                });
                const result = await response.json();
                const mediaData = extractMediaUrl(result, 'mp4');
                if (mediaData.url) {
                    const ext = mediaData.isVideo ? "mp4" : "jpg";
                    const finalFileName = generateFileName(url, "PIN", ext);
                    if (mediaData.isVideo) { videoPlayer.src = mediaData.url; videoPlayer.style.display = 'block'; } 
                    else { imagePlayer.src = mediaData.url; imagePlayer.style.display = 'block'; }
                    downloadLink.href = mediaData.url;
                    downloadLink.download = finalFileName;
                    mediaResult.style.display = 'block';
                    if (autoDownload) forceDownload(mediaData.url, finalFileName);
                    else statusDiv.innerHTML = "✔️ Tìm thấy nội dung Pinterest!";
                } else statusDiv.innerHTML = "<span style='color:red;'>API không lấy được nội dung.</span>";
            } catch (error) { statusDiv.innerHTML = "<span style='color:red;'>Lỗi kết nối RapidAPI Pinterest.</span>"; }
        }

        // --- CHẠM VÀO NÚT NỔI 12ZZ ---
        const fab = document.getElementById('floatingBtn');
        let isDragging = false, isMoved = false, offsetX, offsetY;

        const startDrag = (e) => {
            isDragging = true; isMoved = false;
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            offsetX = clientX - fab.getBoundingClientRect().left;
            offsetY = clientY - fab.getBoundingClientRect().top;
        };

        const drag = (e) => {
            if (!isDragging) return;
            isMoved = true;
            e.preventDefault(); 
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            let newX = clientX - offsetX;
            let newY = clientY - offsetY;
            newX = Math.max(0, Math.min(newX, window.innerWidth - fab.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - fab.offsetHeight));
            fab.style.left = `${newX}px`;
            fab.style.top = `${newY}px`;
            fab.style.right = 'auto';
            fab.style.bottom = 'auto';
        };

        const stopDrag = () => { isDragging = false; };

        fab.addEventListener('mousedown', startDrag);
        fab.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        document.addEventListener('touchend', stopDrag);

        fab.addEventListener('click', async () => {
            if (isMoved) return; 
            try {
                const text = await navigator.clipboard.readText();
                if (text.match(/tiktok\.com|facebook\.com|fb\.watch|pinterest\.com|pin\.it|youtube\.com|youtu\.be/i)) {
                    document.getElementById('mediaUrl').value = text;
                    processLink(true);
                } else {
                    alert("Không tìm thấy link TikTok, Facebook, Pinterest hay YouTube trong khay nhớ tạm!");
                }
            } catch (err) {
                alert("Hãy cấp quyền cho trang web xem khay nhớ tạm nhé!");
            }
        });
    </script>
</body>
</html>
